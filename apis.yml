description: >-
  C# is a modern, object-oriented programming language developed by Microsoft
  as part of the .NET platform. It is used for building Windows applications,
  web services, games (via Unity), and enterprise software, offering strong
  typing, garbage collection, and rich framework support. The C# language is
  defined by a standardized specification and implemented by the Roslyn
  compiler, with packages distributed via NuGet and running on the .NET
  runtime.
apis:
  - aid: c-sharp:c-sharp-language
    name: C# Language
    tags:
      - C#
      - Programming Language
      - Microsoft
    humanURL: https://learn.microsoft.com/en-us/dotnet/csharp/
    properties:
      - type: Website
        url: https://learn.microsoft.com/en-us/dotnet/csharp/
      - type: Documentation
        url: https://learn.microsoft.com/en-us/dotnet/csharp/tour-of-csharp/
      - type: Language Reference
        url: https://learn.microsoft.com/en-us/dotnet/csharp/language-reference/
      - type: Language Specification
        url: https://learn.microsoft.com/en-us/dotnet/csharp/specification/
    description: >-
      The C# language itself: syntax, semantics, type system, and standard
      library conventions. Maintained by Microsoft with a formal ECMA-334
      specification and modern features such as records, pattern matching,
      async/await, and nullable reference types.
  - aid: c-sharp:roslyn-compiler
    name: Roslyn (.NET Compiler Platform)
    tags:
      - Compiler
      - Roslyn
      - Open Source
    humanURL: https://github.com/dotnet/roslyn
    properties:
