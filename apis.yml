        url: https://learn.microsoft.com/en-us/nuget/api/overview
      - type: GitHub
        url: https://github.com/NuGet
    description: >-
      NuGet is the package manager for .NET, providing a central registry of
      open-source and commercial libraries distributed as packages for use in
      C# and other .NET projects. NuGet exposes a documented HTTP API for
      package discovery and publishing.
  - aid: c-sharp:aspnet-core
