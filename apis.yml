        url: https://github.com/dotnet/runtime
      - type: Download
        url: https://dotnet.microsoft.com/download
      - type: Documentation
        url: https://learn.microsoft.com/en-us/dotnet/core/
    description: >-
      The .NET runtime hosts and executes C# programs, providing the CLR,
      base class libraries, garbage collection, and cross-platform support
      for Windows, Linux, and macOS.
  - aid: c-sharp:nuget
    name: NuGet Package Manager
    tags:
      - Package Manager
