        url: https://github.com/dotnet/roslyn
      - type: Documentation
        url: https://learn.microsoft.com/en-us/dotnet/csharp/roslyn-sdk/
    description: >-
      Roslyn is the open-source .NET compiler platform that provides C# and
      Visual Basic compilers with rich code analysis APIs, enabling custom
      analyzers, refactorings, and tooling.
  - aid: c-sharp:dotnet-runtime
    name: .NET Runtime
    tags:
      - Runtime
      - Dotnet
      - Open Source
    humanURL: https://github.com/dotnet/runtime
    properties:
